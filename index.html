<!DOCTYPE html>
<html lang="it">

  <link rel="icon" type="image/png" href="favicon-P.png">
  <link rel="apple-touch-icon" href="favicon-P.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap">

  <style>
    @font-face {
      font-family: 'Villette';
      src: url('Villettev0_2-VariabileVF.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Matrice Mono';
      src: url('MatriceMono-VariableVF.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Merlini';
      src: url('Merlini-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Eras';
      src: url('ErasLetraset-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #111;
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      font-synthesis: none;
      -webkit-font-synthesis: none;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-text-size-adjust: 100%;
      -moz-text-size-adjust: 100%;
      text-size-adjust: 100%;
      cursor: none;
    }

    a, input, textarea, button { cursor: none; }

    /* ── cursore pallina rossa (desktop) ── */
    #cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00f6ff;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      mix-blend-mode: difference;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    #cursor.visible { opacity: 1; }

    @media (hover: none) and (pointer: coarse) {
      html, body, a, input, textarea, button { cursor: auto; }
      #cursor { display: none; }
    }

    /* ── CSS ui ── */
    .ui {
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.1;
      color: #111;
    }

    /* ── blocco top-left ── */
    #header {
      position: fixed;
      top: 32px;
      left: 36px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }
    #header .email { margin-top: 10px; }
    #header .socials { margin-top: 2px; pointer-events: all; }
    #header .socials a {
      color: #111;
      text-decoration: underline;
      text-underline-offset: 2px;
      margin-right: 8px;
    }
    #header .socials a:hover { opacity: 0.5; }
    #header .email a {
      color: #111;
      text-decoration: none;
      pointer-events: auto;
      cursor: pointer;
    }
    #header .email a:hover { opacity: 0.5; }

    /* ── istruzioni ── */
    #hint {
      position: fixed;
      left: 36px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      pointer-events: none;
      user-select: none;
      line-height: 1.5;
    }

    /* ── bottom-left now showing ── */
    #now-showing {
      position: fixed;
      bottom: 32px;
      left: 36px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      line-height: 1.5;
    }
    #now-showing .font-name { font-style: italic; }

    /* ── lettere rimbalzine ── */
    /*
       ogni lettera renderizzata come canva e non come box
    */
    .letter {
      position: fixed;
      z-index: 2;
      pointer-events: none;
      user-select: none;
      will-change: left, top;
      transition: opacity 0.5s ease;
    }

    /* ── canva disegno mobile ── */
    #draw-canvas {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 3;
      touch-action: none;
    }

    @media (hover: none) and (pointer: coarse) {
      #draw-canvas { display: block; }
      #header     { top: 20px; left: 20px; }
      #hint       { left: 20px; right: 20px; }
      #now-showing{ bottom: 20px; left: 20px; }

    /* ── per debug (activated by ?debug=1) ── */
    #debug-badge {
      display: none;

      top: 20px;
      right: 20px;
      z-index: 100;
      background: #000;
      color: #0f0;

      max-width: 260px;
      line-height: 1.4;
      white-space: pre-wrap;
      border-radius: 4px;
      pointer-events: none;
    }
    body.debug #debug-badge { display: block; }
    body.force-mobile #draw-canvas { display: block; }
  </style>
</head>
<body>

  <div id="cursor"></div>

    <span class="hint-desktop">press a key to spawn a glyph<br>change typeface using space bar</span>

  </div>

  <div id="now-showing" class="ui">
    <div>now showing</div>
    <div class="font-name" id="font-name-label"></div>
  </div>

  <canvas id="draw-canvas"></canvas>
  <div id="debug-badge"></div>

<script>
// ═════════════════════════════════════════════════════════════════════
// $P POINT-CLOUD RECOGNIZER
// Vatavu, Anthony & Wobbrock (ICMI 2012).
// Template-based gesture recognizer.
// ═════════════════════════════════════════════════════════════════════
const NumPoints = 32;
const Origin = { X: 0, Y: 0 };

function Point(x, y, id) { this.X = x; this.Y = y; this.ID = id; }

function PointCloud(name, points) {
  this.Name = name;
  this.Points = Resample(points, NumPoints);
  this.Points = Scale(this.Points);
  this.Points = TranslateTo(this.Points, Origin);
}

function PDollarRecognizer() {
  this.PointClouds = [];
  this.Recognize = function (points) {
    if (this.PointClouds.length === 0) return { Name: null, Score: 0, top: [] };
    points = Resample(points, NumPoints);
    points = Scale(points);
    points = TranslateTo(points, Origin);
    let best = +Infinity, u = -1;
    const all = [];
    for (let i = 0; i < this.PointClouds.length; i++) {
      const d = GreedyCloudMatch(points, this.PointClouds[i]);
      all.push({ name: this.PointClouds[i].Name, distance: d });
      if (d < best) { best = d; u = i; }
    }
    all.sort((a, b) => a.distance - b.distance);
    return u === -1
      ? { Name: null, Score: 0, top: [] }
      : { Name: this.PointClouds[u].Name, Score: Math.max((best - 2.0) / -2.0, 0.0), top: all.slice(0, 3) };
  };
  this.AddPointCloud = function (name, points) {
    this.PointClouds.push(new PointCloud(name, points));
  };
}

function GreedyCloudMatch(points, P) {
  const e = 0.50;
  const step = Math.floor(Math.pow(points.length, 1.0 - e));
  let min = +Infinity;
  for (let i = 0; i < points.length; i += step) {
    const d1 = CloudDistance(points, P.Points, i);
    const d2 = CloudDistance(P.Points, points, i);
    min = Math.min(min, Math.min(d1, d2));
  }
  return min;
}

function CloudDistance(pts1, pts2, start) {
  const matched = new Array(pts1.length).fill(false);
  let sum = 0, i = start;
  do {
    let index = -1, min = +Infinity;
    for (let j = 0; j < matched.length; j++) {
      if (!matched[j]) {
        const d = Distance(pts1[i], pts2[j]);
        if (d < min) { min = d; index = j; }
      }
    }
    matched[index] = true;
    const weight = 1 - ((i - start + pts1.length) % pts1.length) / pts1.length;
    sum += weight * min;
    i = (i + 1) % pts1.length;
  } while (i !== start);
  return sum;
}

function Resample(points, n) {
  const I = PathLength(points) / (n - 1);
  let D = 0.0;
  const newpoints = [points[0]];
  for (let i = 1; i < points.length; i++) {
    if (points[i].ID === points[i - 1].ID) {
      const d = Distance(points[i - 1], points[i]);
      if (D + d >= I) {
        const qx = points[i - 1].X + ((I - D) / d) * (points[i].X - points[i - 1].X);
        const qy = points[i - 1].Y + ((I - D) / d) * (points[i].Y - points[i - 1].Y);
        const q = new Point(qx, qy, points[i].ID);
        newpoints.push(q);
        points.splice(i, 0, q);
        D = 0.0;
      } else D += d;
    }
  }
  if (newpoints.length === n - 1) {
    const last = points[points.length - 1];
    newpoints.push(new Point(last.X, last.Y, last.ID));
  }
  return newpoints;
}

function Scale(points) {
  let minX = +Infinity, maxX = -Infinity, minY = +Infinity, maxY = -Infinity;
  for (const p of points) {
    if (p.X < minX) minX = p.X;
    if (p.Y < minY) minY = p.Y;
    if (p.X > maxX) maxX = p.X;
    if (p.Y > maxY) maxY = p.Y;
  }
  const size = Math.max(maxX - minX, maxY - minY) || 1;
  return points.map(p => new Point((p.X - minX) / size, (p.Y - minY) / size, p.ID));
}

function TranslateTo(points, pt) {
  const c = Centroid(points);
  return points.map(p => new Point(p.X + pt.X - c.X, p.Y + pt.Y - c.Y, p.ID));
}

function Centroid(points) {
  let x = 0, y = 0;
  for (const p of points) { x += p.X; y += p.Y; }
  return { X: x / points.length, Y: y / points.length };
}

function PathLength(points) {
  let d = 0;
  for (let i = 1; i < points.length; i++) {
    if (points[i].ID === points[i - 1].ID) d += Distance(points[i - 1], points[i]);
  }
  return d;
}

function Distance(p1, p2) {
  const dx = p2.X - p1.X, dy = p2.Y - p1.Y;
  return Math.sqrt(dx * dx + dy * dy);
}


// ═════════════════════════════════════════════════════════════════════
// CONFIG
// ═════════════════════════════════════════════════════════════════════
const FONTS = [
  { family: 'Villette',     label: 'Villette Variabile', weightMin: 100, weightMax: 900 },
  { family: 'Matrice Mono', label: 'Matrice Mono',       weightMin: 100, weightMax: 800 },
  /* { family: 'Merlini',    label: 'Merlini',            weightMin: 400, weightMax: 400 }, */
  { family: 'Eras',         label: 'Sera (WIP)',         weightMin: 400, weightMax: 400 },
];

const SPEED = 1.8;
const LETTER_TTL = 60000; // lettere scompaiono dopo 60 sec

// mobile drawing tuning
const MIN_STROKE_POINTS     = 6;
const MIN_STROKE_LENGTH     = 30;   // px — below = tap
const MULTISTROKE_TIMEOUT   = 280;  // ms between strokes in a multistroke glyph
const DOUBLE_TAP_MS         = 350;
const DOUBLE_TAP_DIST       = 50;
const RECOGNITION_THRESHOLD = 0.10;

// responsive letter size
function computeSize() {
  const minDim = Math.min(window.innerWidth, window.innerHeight);
  return Math.max(70, Math.min(150, minDim * 0.22));
}


// ═════════════════════════════════════════════════════════════════════
// INK MEASUREMENT
// ═════════════════════════════════════════════════════════════════════
// misurazione del canva per evitare che Villette sia tagliato.
// ═════════════════════════════════════════════════════════════════════
const _inkCanvas = document.createElement('canvas');
const _inkCtx = _inkCanvas.getContext('2d', { willReadFrequently: true });
const _inkCache = new Map();

function measureInk(char, family, weight, size) {
  const key = `${char}|${family}|${weight}|${size}`;
  if (_inkCache.has(key)) return _inkCache.get(key);

  // regolazione ampiezza canva.
  const S = Math.ceil(size * 3);
  const cx = Math.floor(S / 2);
  const cy = Math.floor(S * 0.7); // baseline.

  _inkCanvas.width  = S;
  _inkCanvas.height = S;
  _inkCtx.clearRect(0, 0, S, S);
  _inkCtx.font = `${weight} ${size}px '${family}', serif`;
  _inkCtx.textBaseline = 'alphabetic';
  _inkCtx.fillStyle = '#000';
  _inkCtx.fillText(char, cx, cy);

  const img = _inkCtx.getImageData(0, 0, S, S).data;

  // fit glifo nel canva.
  let minX = S, minY = S, maxX = -1, maxY = -1;
  for (let y = 0; y < S; y++) {
    const row = y * S * 4;
    for (let x = 0; x < S; x++) {
      if (img[row + x * 4 + 3] > 0) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  let result;
  if (maxX < 0) {
    // empty glyph (space etc) — minimal box, origin at the top-left
    result = {
      width:  Math.round(size * 0.3),
      height: Math.round(size * 0.1),
      originX: 0,
      originY: size * 0.1,
    };
  } else {
    // ink box width = (maxX - minX + 1), height = (maxY - minY + 1).
    // 1px safety padding.
    const pad = 1;
    result = {
      width:   (maxX - minX + 1) + pad * 2,
      height:  (maxY - minY + 1) + pad * 2,
      originX: (cx - minX) + pad,
      originY: (cy - minY) + pad,
    };
  }

  _inkCache.set(key, result);
  return result;
}

// ═════════════════════════════════════════════════════════════════════
// PRELOAD FONTS
// ═════════════════════════════════════════════════════════════════════
// forzare load per iOS Safari che fa casini con la cache.
async function preloadFonts() {
  if (!document.fonts || !document.fonts.load) return;
  try {
    await Promise.all([
      document.fonts.load('400 100px "Villette"'),
      document.fonts.load('900 100px "Villette"'),
      document.fonts.load('400 100px "Matrice Mono"'),
      document.fonts.load('400 100px "Eras"'),
      document.fonts.ready,
    ]);
  } catch (e) {
    console.warn('[fonts] preload warning', e);
  }
  _inkCache.clear();
  letters.forEach(paintLetter);
  debugLog('fonts loaded ✓ ink cache refreshed');
}


// ═════════════════════════════════════════════════════════════════════
// STATE
// ═════════════════════════════════════════════════════════════════════
let fontIndex = 0;
let letters   = [];

const hint          = document.getElementById('hint');
const fontNameLabel = document.getElementById('font-name-label');
const cursor        = document.getElementById('cursor');
const drawCanvas    = document.getElementById('draw-canvas');
const drawCtx       = drawCanvas.getContext('2d');
const debugBadge    = document.getElementById('debug-badge');

// Query-string options
const qs = new URLSearchParams(window.location.search);
const forceMobile   = qs.has('mobile');
const debugMode     = qs.has('debug');
const isTouchDevice = forceMobile || window.matchMedia('(hover: none) and (pointer: coarse)').matches;

if (debugMode)   document.body.classList.add('debug');
if (forceMobile) document.body.classList.add('force-mobile');

if (isTouchDevice) {
  document.querySelector('.hint-desktop').style.display = 'none';
  document.querySelector('.hint-mobile').style.display = 'inline';
}

function debugLog(msg) {
  if (!debugMode) return;
  debugBadge.textContent = msg;
  console.log('[debug]', msg);
}


// ═════════════════════════════════════════════════════════════════════
// HELPERS
// ═════════════════════════════════════════════════════════════════════
const rand    = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));

const currentFont  = () => FONTS[fontIndex];
const pickWeight   = (font) => randInt(font.weightMin, font.weightMax);
const updateLabel  = () => { fontNameLabel.textContent = currentFont().label; };


// ═════════════════════════════════════════════════════════════════════
// CUSTOM CURSOR (desktop only)
// ═════════════════════════════════════════════════════════════════════
if (!isTouchDevice) {
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
    if (!cursor.classList.contains('visible')) cursor.classList.add('visible');
  });
  document.addEventListener('mouseleave', () => cursor.classList.remove('visible'));
  document.addEventListener('mouseenter', () => cursor.classList.add('visible'));
}


// ═════════════════════════════════════════════════════════════════════
// SPAWN & REMOVE LETTERS
// ═════════════════════════════════════════════════════════════════════
function paintLetter(l) {
  const ink = measureInk(l.char, l.fontFamily, l.weight, l.size);
  const dpr = window.devicePixelRatio || 1;

  l.el.width  = Math.ceil(ink.width  * dpr);
  l.el.height = Math.ceil(ink.height * dpr);
  l.el.style.width  = ink.width  + 'px';
  l.el.style.height = ink.height + 'px';

  const ctx = l.el.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, ink.width, ink.height);
  ctx.font = `${l.weight} ${l.size}px '${l.fontFamily}', serif`;
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#111';
  ctx.fillText(l.char, ink.originX, ink.originY);

  l.w = ink.width;
  l.h = ink.height;
}


// ═════════════════════════════════════════════════════════════════════
// SPAWN & REMOVE LETTERS
// ═════════════════════════════════════════════════════════════════════
function spawnLetter(char) {
  const font   = currentFont();
  const size   = computeSize();
  const weight = pickWeight(font);

  const el = document.createElement('canvas');
  el.className = 'letter';
  document.body.appendChild(el);

  const l = {
    el, char, size, weight,
    fontFamily: font.family,
    x: 0, y: 0, vx: 0, vy: 0, w: 0, h: 0,
    born: Date.now(), dying: false,
  };
  paintLetter(l);

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  l.x  = rand(0, Math.max(1, vw - l.w));
  l.y  = rand(0, Math.max(1, vh - l.h));
  l.vx = SPEED * (Math.random() < 0.5 ? 1 : -1);
  l.vy = SPEED * (Math.random() < 0.5 ? 1 : -1);

  el.style.left = l.x + 'px';
  el.style.top  = l.y + 'px';

  letters.push(l);
}

function removeLetter(obj) {
  obj.dying = true;
  obj.el.style.opacity = '0';
  setTimeout(() => {
    obj.el.remove();
    letters = letters.filter(l => l !== obj);
  }, 520);
}


// ═════════════════════════════════════════════════════════════════════
// FONT SWITCH
// ═════════════════════════════════════════════════════════════════════
function nextFont() {
  fontIndex = (fontIndex + 1) % FONTS.length;
  const font = currentFont();
  letters.forEach(l => {
    l.fontFamily = font.family;
    l.weight = pickWeight(font);
    paintLetter(l);
  });
  updateLabel();
}


// ═════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═════════════════════════════════════════════════════════════════════
function tick() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const now = Date.now();

  letters.forEach(l => {
    if (l.dying) return;
    l.x += l.vx;
    l.y += l.vy;

    // l.w / l.h = real ink dimensions (set by paintLetter),
    let bounced = false;
    if (l.x <= 0)             { l.x = 0;          l.vx =  Math.abs(l.vx); bounced = true; }
    if (l.x + l.w >= vw)      { l.x = vw - l.w;   l.vx = -Math.abs(l.vx); bounced = true; }
    if (l.y <= 0)             { l.y = 0;          l.vy =  Math.abs(l.vy); bounced = true; }
    if (l.y + l.h >= vh)      { l.y = vh - l.h;   l.vy = -Math.abs(l.vy); bounced = true; }

    l.el.style.left = l.x + 'px';
    l.el.style.top  = l.y + 'px';

    if (bounced && now - l.born >= LETTER_TTL) removeLetter(l);
  });

  requestAnimationFrame(tick);
}


// ═════════════════════════════════════════════════════════════════════
// DESKTOP INPUT (keyboard)
// ═════════════════════════════════════════════════════════════════════
if (!isTouchDevice) {
  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      nextFont();
      return;
    }
    if (e.key.length === 1) spawnLetter(e.key);
  });
}


// ═════════════════════════════════════════════════════════════════════
// MOBILE INPUT: drawing canvas + $P recognition + double-tap
// ═════════════════════════════════════════════════════════════════════
const recognizer = new PDollarRecognizer();
let templatesLoaded = false;

async function loadTemplates() {
  try {
    const res = await fetch('templates.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    let count = 0;
    const DISABLED_GLYPHS = new Set(['@']);
    for (const glyph in data) {
      if (DISABLED_GLYPHS.has(glyph)) continue;
      for (const templatePts of data[glyph]) {
        recognizer.AddPointCloud(glyph, templatePts.map(p => new Point(p.X, p.Y, p.ID)));
        count++;
      }
    }
    templatesLoaded = count > 0;
    debugLog(`loaded ${count} templates\n${Object.keys(data).length} glyphs\nready ✓`);
  } catch (e) {
    console.warn('[recognizer]', e.message);
    debugLog('TEMPLATES NOT LOADED\n' + e.message + '\n\nfallback: random spawn');
  }
}

if (isTouchDevice) loadTemplates();

// drawing state
let strokes = [];
let currentStroke = null;
let strokeID = 0;
let isDrawing = false;
let multistrokeTimer = null;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  drawCanvas.width  = window.innerWidth  * dpr;
  drawCanvas.height = window.innerHeight * dpr;
  drawCanvas.style.width  = window.innerWidth  + 'px';
  drawCanvas.style.height = window.innerHeight + 'px';
  drawCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  drawCtx.lineWidth = 3;
  drawCtx.strokeStyle = '#111';
}
if (isTouchDevice) resizeCanvas();

function clearDrawCanvas() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function strokeLength(stroke) {
  let len = 0;
  for (let i = 1; i < stroke.length; i++) {
    const dx = stroke[i].X - stroke[i - 1].X;
    const dy = stroke[i].Y - stroke[i - 1].Y;
    len += Math.sqrt(dx * dx + dy * dy);
  }
  return len;
}

function flashCanvasRed() {
  drawCtx.save();
  drawCtx.strokeStyle = '#c00';
  drawCtx.lineWidth = 3;
  strokes.forEach(s => {
    drawCtx.beginPath();
    s.forEach((p, i) => i === 0 ? drawCtx.moveTo(p.X, p.Y) : drawCtx.lineTo(p.X, p.Y));
    drawCtx.stroke();
  });
  drawCtx.restore();
  setTimeout(clearDrawCanvas, 180);
}

function processGesture() {
  const allPoints = strokes.flat();
  const totalLen = strokes.reduce((s, stroke) => s + strokeLength(stroke), 0);

  if (templatesLoaded) {
    const result = recognizer.Recognize(allPoints);
    const topStr = (result.top || []).map(t => `${t.name}(${t.distance.toFixed(2)})`).join(' ');
    debugLog(
      `strokes:${strokes.length} pts:${allPoints.length}\n` +
      `len:${totalLen.toFixed(0)}px\n` +
      `=> ${result.Name} score:${result.Score.toFixed(2)}\n` +
      `top: ${topStr}`
    );
    if (result.Name && result.Score >= RECOGNITION_THRESHOLD) {
      spawnLetter(result.Name);
      clearDrawCanvas();
    } else {
      flashCanvasRed();
    }
  } else {
    // no templates: fallback to random spawn
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    spawnLetter(CHARS[Math.floor(Math.random() * CHARS.length)]);
    clearDrawCanvas();
    debugLog('NO TEMPLATES — random spawn');
  }
  strokes = [];
}

if (isTouchDevice) {
  let pendingTap = null;     // { x, y, t } — candidate first tap of a double-tap
  let activePointerId = null; // solo primo dito poggiato, max 1 input

  drawCanvas.addEventListener('pointerdown', (e) => {
    // ignora input altre dita
    if (activePointerId !== null) { e.preventDefault(); return; }
    e.preventDefault();

    activePointerId = e.pointerId;
    drawCanvas.setPointerCapture(e.pointerId);

    const now = Date.now();

    // check double-tap
    if (pendingTap) {
      const dx = e.clientX - pendingTap.x;
      const dy = e.clientY - pendingTap.y;
      if (now - pendingTap.t < DOUBLE_TAP_MS && Math.hypot(dx, dy) < DOUBLE_TAP_DIST) {
        nextFont();
        pendingTap = null;
        if (multistrokeTimer) { clearTimeout(multistrokeTimer); multistrokeTimer = null; }
        strokes = [];
        isDrawing = false;
        activePointerId = null;
        clearDrawCanvas();
        debugLog('DOUBLE TAP → next font');
        return;
      }
    }

    if (multistrokeTimer) { clearTimeout(multistrokeTimer); multistrokeTimer = null; }
    strokeID++;
    currentStroke = [new Point(e.clientX, e.clientY, strokeID)];
    strokes.push(currentStroke);
    isDrawing = true;

    drawCtx.beginPath();
    drawCtx.moveTo(e.clientX, e.clientY);
  });

  drawCanvas.addEventListener('pointermove', (e) => {
    if (e.pointerId !== activePointerId || !isDrawing) return;
    e.preventDefault();
    currentStroke.push(new Point(e.clientX, e.clientY, strokeID));
    drawCtx.lineTo(e.clientX, e.clientY);
    drawCtx.stroke();
  });

  function onPointerEnd(e) {
    if (e.pointerId !== activePointerId) return;
    if (!isDrawing) { activePointerId = null; return; }
    e.preventDefault();
    isDrawing = false;
    activePointerId = null;

    const x = e.clientX, y = e.clientY;
    const lastStroke = strokes[strokes.length - 1];
    const isJustATap = strokes.length === 1
      && lastStroke.length < MIN_STROKE_POINTS
      && strokeLength(lastStroke) < MIN_STROKE_LENGTH;

    if (isJustATap) {
      // first tap of a possible double-tap: remember it, drop the stroke.
      pendingTap = { x, y, t: Date.now() };
      strokes = [];
      clearDrawCanvas();
      debugLog('tap registered (pending double-tap)');
      setTimeout(() => {
        if (pendingTap && Date.now() - pendingTap.t >= DOUBLE_TAP_MS) pendingTap = null;
      }, DOUBLE_TAP_MS + 20);
      return;
    }

    // real drawing gesture: brief wait for multistroke continuation, then recognize
    multistrokeTimer = setTimeout(() => {
      multistrokeTimer = null;
      processGesture();
    }, MULTISTROKE_TIMEOUT);
  }

  drawCanvas.addEventListener('pointerup',     onPointerEnd);
  drawCanvas.addEventListener('pointercancel', onPointerEnd);
  drawCanvas.addEventListener('pointerleave',  onPointerEnd);
}


// ═════════════════════════════════════════════════════════════════════
// RESIZE
// ═════════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  letters.forEach(l => {
    if (l.x + l.w > vw) l.x = Math.max(0, vw - l.w);
    if (l.y + l.h > vh) l.y = Math.max(0, vh - l.h);
  });
  if (isTouchDevice) resizeCanvas();
});


// ═════════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════════
updateLabel();
tick();
preloadFonts();

// per evitare bot e spam.
(() => {
  const user = ['riccardomerlotti', 'psd'].join('.');
  const addr = user + '@' + 'gmail.com';
  const link = document.getElementById('email-link');
  if (link) link.href = 'mailto:' + addr;
})();

</script>
